<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Document</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Description">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <!-- <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css"> -->
  <!-- <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/themes/vue.css"> -->
  <!-- <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/themes/buble.css"> -->
  <!-- <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/themes/dark.css"> -->
  <!-- <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/themes/pure.css"> -->
  <!-- <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/themes/dolphin.css"> -->

  <!-- 浅色 + 暗黑主题 -->
  <link rel="stylesheet" title="light" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <link rel="stylesheet" title="dark" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">

  <style>
    /* 导航栏避让按钮 */
    .app-nav {
      padding-right: 120px;
    }

    /* 按钮基础样式 */
    #switchTheme {
      position: fixed;
      top: 15px;
      right: 15px;
      z-index: 9999;
      padding: 6px 12px;
      border-radius: 8px;
      border: 0;
      cursor: pointer;
      font-size: 16px;
      transition: all 0.2s;
    }

    /* 浅色模式：浅灰按钮 + 深字 */
    body:not(.dark-mode) #switchTheme {
      background-color: #e5e7eb !important;
      color: #1f2937 !important;
    }

    /* 暗黑模式：深灰按钮 + 白字 */
    body.dark-mode #switchTheme {
      background-color: #374151 !important;
      color: #ffffff !important;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '',
      repo: '',
      loadSidebar: true,
      coverpage: true,
      onlyCover: true,
      loadNavbar: true
    }
  </script>
  <!-- Docsify v4 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>

  <!-- 主题切换按钮 -->
  <button id="switchTheme"></button>
  <script>
    const btn = document.getElementById('switchTheme');
    const body = document.body;
    let isDark = localStorage.getItem('siteTheme') !== 'light';
    const lightCSS = document.querySelector('link[title="light"]');
    const darkCSS = document.querySelector('link[title="dark"]');

    function setTheme(dark) {
      if (dark) {
        lightCSS.disabled = true;
        darkCSS.disabled = false;
        body.classList.add('dark-mode');
        btn.innerText = "🌙";
      } else {
        lightCSS.disabled = false;
        darkCSS.disabled = true;
        body.classList.remove('dark-mode');
        btn.innerText = "☀️";
      }
      localStorage.setItem('siteTheme', dark ? 'dark' : 'light');
    }

    // 初始化主题
    setTheme(isDark);

    // 点击切换
    btn.onclick = () => {
      isDark = !isDark;
      setTheme(isDark);
    }
  </script>
</body>
</html>
